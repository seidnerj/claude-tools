# Pre-commit configuration for claude-tools
# Install with: pre-commit install --hook-type commit-msg --hook-type pre-commit
# Run manually with: pre-commit run --all-files

repos:
    # Built-in pre-commit hooks
    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v5.0.0
      hooks:
          - id: trailing-whitespace

          - id: end-of-file-fixer

          - id: mixed-line-ending
            args: [--fix=lf]

          - id: check-merge-conflict

          - id: check-added-large-files
            args: ["--maxkb=500"]

          - id: check-json

          - id: check-yaml
            args: [--allow-multiple-documents]

          - id: pretty-format-json
            args: [--autofix, --indent, "4"]
            exclude: tsconfig\.json$

    # Detect secrets
    - repo: https://github.com/Yelp/detect-secrets
      rev: v1.5.0
      hooks:
          - id: detect-secrets
            args: ["--baseline", ".secrets.baseline"]

    # TypeScript hooks

    - repo: https://github.com/gitleaks/gitleaks
      rev: v8.30.1
      hooks:
          - id: gitleaks
    - repo: local
      hooks:
          - id: prettier
            name: prettier
            entry: npx prettier --write --ignore-unknown
            language: system
            types_or: [ts, json, css, markdown, yaml]
            exclude: "(node_modules|dist)/"

          - id: eslint
            name: eslint
            entry: npx eslint --fix --no-error-on-unmatched-pattern
            language: system
            types: [ts]
            exclude: "(node_modules|dist)/"

          - id: typescript-check
            name: typescript type check
            entry: bash -c 'npx tsc --noEmit'
            language: system
            types: [ts]
            pass_filenames: false

          - id: run-tests
            name: run tests
            entry: bash -c 'CI=true npx vitest run'
            language: system
            types: [ts]
            pass_filenames: false

    # Local hooks
    - repo: local
      hooks:
          - id: check-claude-attribution
            name: check commit message for Claude attribution
            description: Prevent commits with Claude attribution
            entry: bash scripts/check-claude-attribution.sh
            language: system
            stages: [commit-msg]
            always_run: true
            pass_filenames: true

# Global settings
default_stages: [pre-commit]
fail_fast: false
